# ??? Server ??????????????????????????????????????????????????????????????????
server.servlet.context-path=/api

# ??? Database ?????????????????????????????????????????????????????????????????
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# H2 (local)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

spring.flyway.enabled=true

spring.flyway.locations=classpath:db/migration

# ??? JWT ??????????????????????????????????????????????????????????????????????
# VA?NO: U produkciji OBAVEZNO postavi JWT_SECRET env varijablu u Railway!
# Minimalno 32 znaka, ?to slo?enije to bolje
# Lokalno: koristi ovu fallback vrijednost (samo za razvoj!)
jwt.secret=${JWT_SECRET:local-dev-secret-key-this-is-only-for-development-minimum-32}
jwt.expiration=${JWT_EXPIRATION:86400000}

logging.level.com.store=INFO
logging.level.org.springframework.security=WARN